name: publish-gitbook

on:
  workflow_dispatch:
  schedule:
    - cron: '5 1 * * 1-5'

permissions:
  contents: write

concurrency:
  group: publish-gitbook
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FUND_ADVISOR_LLM_API_KEY: ${{ secrets.FUND_ADVISOR_LLM_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Publish GitBook docs
        run: go run ./cmd/fundcli docs publish --config ./configs/portfolio.yaml --refresh --days 180

      - name: Commit generated docs
        run: |
          git add -A docs/gitbook
          if git diff --cached --quiet; then
            echo "No docs changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update GitBook docs"
          git push
