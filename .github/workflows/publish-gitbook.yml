name: publish-gitbook

on:
  workflow_dispatch:
  schedule:
    # 06:00 UTC = 14:00 Asia/Shanghai on weekdays.
    - cron: '0 6 * * 1-5'

permissions:
  contents: write

concurrency:
  group: publish-gitbook
  cancel-in-progress: false

env:
  PUBLISH_BRANCH: gitbook-publish
  PUBLISH_WORKTREE: /tmp/fundcli-gitbook-publish

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FUND_ADVISOR_LLM_API_KEY: ${{ secrets.FUND_ADVISOR_LLM_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Show trigger time in Asia/Shanghai
        run: TZ=Asia/Shanghai date '+triggered at %Y-%m-%d %H:%M:%S %Z'

      - name: Publish GitBook docs
        run: go run ./cmd/fundcli docs publish --config ./configs/portfolio.yaml --refresh --days 180

      - name: Show generated docs status
        run: git status --short docs/gitbook

      - name: Prepare publish worktree
        run: |
          git fetch origin "${PUBLISH_BRANCH}" || true
          rm -rf "${PUBLISH_WORKTREE}"
          if git show-ref --verify --quiet "refs/remotes/origin/${PUBLISH_BRANCH}"; then
            git worktree add -B "${PUBLISH_BRANCH}" "${PUBLISH_WORKTREE}" "origin/${PUBLISH_BRANCH}"
          else
            git worktree add --detach "${PUBLISH_WORKTREE}"
            cd "${PUBLISH_WORKTREE}"
            git switch --orphan "${PUBLISH_BRANCH}"
            git rm -rf --cached . || true
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          fi

      - name: Sync docs to publish branch
        run: |
          mkdir -p "${PUBLISH_WORKTREE}/docs"
          rsync -a --delete docs/gitbook/ "${PUBLISH_WORKTREE}/docs/gitbook/"
          cd "${PUBLISH_WORKTREE}"
          git add -A docs/gitbook
          if git diff --cached --quiet; then
            echo "No docs changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update GitBook docs and market pool snapshot"
          git push origin HEAD:"${PUBLISH_BRANCH}"

      - name: Clean up worktree
        if: always()
        run: |
          git worktree remove "${PUBLISH_WORKTREE}" --force || true
