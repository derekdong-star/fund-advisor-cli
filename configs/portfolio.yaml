# Generated by fundcli init
portfolio:
    name: dhw-fund-portfolio
    currency: CNY
    benchmark: custom-mix
storage:
    driver: sqlite
    dsn: ../data/fundcli.db
data_source:
    provider: eastmoney
    tushare_token_env: TUSHARE_TOKEN
    request_timeout_seconds: 15
strategy:
    rebalance:
        relative_drift_threshold: 0.25
        absolute_drift_threshold: 0.05
    holding_health:
        underperform_60d_threshold: -0.08
        review_score_threshold: 2
        replace_score_threshold: 3
    buy_signal:
        max_single_position_weight: 0.18
        min_gap_to_target: 0.2
    sell_signal:
        overweight_relative_threshold: 0.35
        overweight_absolute_threshold: 0.08
    candidate_pool:
        min_fund_size_yi: 8
        min_established_years: 1
        max_expense_ratio: 0.008
        core_require_index: true
        prefer_benchmark_match: true
    turnover:
        mode: low_turnover
        min_swap_score: 7
        max_protected_reduce_weight: 0.22
        monthly_dca_amount: 5000
        min_dca_fund_amount: 1000
        dca_frequency: monthly
        max_dca_funds: 3
        pause_dca_on_risk: true
        prefer_dca: true
llm:
    enabled: false
    provider: openai
    base_url: https://open.palebluedot.ai/v1
    model: anthropic/claude-sonnet-4.6
    api_key_env: FUND_ADVISOR_LLM_API_KEY
    timeout_seconds: 20
    mode: rerank_only
    max_candidates_per_call: 8
publishing:
    gitbook:
        enabled: true
        mode: git-sync
        docs_root: ../docs/gitbook
        project_directory: docs/gitbook
        generate_homepage: true
        generate_summary: true
        include_daily: true
        include_dca_plan: true
        include_backtest: true
        hide_backtest_when_unavailable: true
        backtest_days: 120
        backtest_rebalance_every: 20
        archive_by_run_date: true
        overwrite_latest: true
        retain_days: 0
        site_title: Derek Fund Advisor
        site_description: Low-turnover, long-term holding, DCA-first portfolio reports
        strategy_overview_path: strategy/overview.md
        risk_disclosure_path: about/risk.md
        visibility: public
        organization_id: ""
        site_id: ""
        space_id: ""
